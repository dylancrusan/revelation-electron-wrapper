<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title data-translate>Presentation Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/css/presentations.css" />
  <link rel="stylesheet" href="/admin/builder.css" />
</head>
<body class="builder">
  <header class="builder-header">
    <div class="builder-title">
      <h1 data-translate>Presentation Builder</h1>
      <div class="builder-subtitle" id="builder-file"></div>
    </div>
    <div class="builder-actions">
      <button id="save-btn" class="primary"  title="Ctrl-S" data-translate>Save</button>
      <div class="builder-dropdown">
        <button id="edit-menu-btn" type="button"><span data-translate>Edit</span> ▾</button>
        <div id="edit-menu" class="builder-dropdown-menu" hidden>
          <button id="edit-undo-btn" class="builder-dropdown-item" type="button">↩ <span data-translate>Undo</span> <span class="builder-shortcut">⌘Z</span></button>
        </div>
      </div>
      <div class="builder-dropdown">
        <button id="add-content-btn" type="button" data-translate>Add Content ▾</button>
        <div id="add-content-menu" class="builder-dropdown-menu" hidden></div>
      </div>
      <div class="builder-dropdown">
        <button id="variant-menu-btn" type="button"><span data-translate>Variants</span> ▾</button>
        <div id="variant-menu" class="builder-dropdown-menu" hidden></div>
      </div>
      <div class="builder-dropdown">
        <button id="presentation-menu-btn" type="button"><span data-translate>Presentation</span> ▾</button>
        <div id="presentation-menu" class="builder-dropdown-menu" hidden>
          <button id="presentation-show-full-btn" class="builder-dropdown-item" type="button" data-translate>Show Presentation (F5)</button>
          <button id="presentation-show-from-slide-btn" class="builder-dropdown-item" type="button" data-translate>Show from Current Slide (Shift+F5)</button>
          <button id="presentation-show-btn" class="builder-dropdown-item" type="button" data-translate>Show in Window</button>
          <button id="record-slide-timings-btn" class="builder-dropdown-item" type="button" data-translate>Record Slide Timings</button>
          <button id="presentation-properties-btn" class="builder-dropdown-item" type="button" data-translate>Presentation Properties</button>
          <button id="edit-external-btn" class="builder-dropdown-item" type="button" data-translate>Edit External</button>
          <button id="open-presentation-folder-btn" class="builder-dropdown-item" type="button" data-translate>Open Folder</button>
        </div>
      </div>
      <button id="reparse-btn" aria-label="Re-parse Slides" title="Re-parse Slides" style="font-size: 15pt;">⟳</button>
      <button id="help-btn" title="Help">❔</button>
    </div>
  </header>

  <main class="builder-layout">
    <!-- ── Left panel: slide list ─────────────────────────────────── -->
    <section class="builder-left">
      <div class="builder-panel column-panel" data-panel="columns">
        <div class="panel-header panel-header-row">
          <div class="panel-actions">
            <button id="prev-column-btn" class="panel-button"  title="Ctrl-Left">◀</button>
            <button id="next-column-btn" class="panel-button"  title="Ctrl-Right">▶</button>
            <button id="column-md-btn" class="panel-button" style="font-size: 14pt;">{ }</button>
            <div class="builder-dropdown">
              <button id="column-menu-btn" class="panel-button" type="button">Column ▾</button>
              <div id="column-menu" class="builder-dropdown-menu" hidden>
                <button id="column-add-menu-item" class="builder-dropdown-item" type="button">✨ <span data-translate>Add Column</span> (Ctrl+L)</button>
                <button id="column-delete-menu-item" class="builder-dropdown-item" type="button">❌ <span data-translate>Delete Column</span></button>
                <button id="column-move-left-menu-item" class="builder-dropdown-item" type="button" title="Move column left">⬅ <span data-translate>Move Left</span></button>
                <button id="column-move-right-menu-item" class="builder-dropdown-item" type="button" title="Move column right">⮕ <span data-translate></span>Move Right</span></button>
              </div>
            </div>
            <button class="panel-toggle" type="button" aria-expanded="true" aria-label="Collapse section columns" style="display: none;"></button>
          </div>
        </div>
        <div class="panel-body">
          <div class="column-meta">
            <span id="column-label">Column 1 of 1</span>
          </div>
        <div class="panel-subsection panel-collapsible" data-panel="slides-in-column">
          <div class="panel-header panel-header-row">
            <span><span data-translate>Slides in Column</span> <span id="slide-count-label" class="panel-subtitle"></span></span>
            <div class="panel-actions">
              <div class="builder-dropdown">
                <button id="slide-menu-btn" class="panel-button" type="button">Slide ▾</button>
                <div id="slide-menu" class="builder-dropdown-menu" hidden>
                  <button id="slide-add-menu-item" class="builder-dropdown-item" type="button">✨ <span data-translate>Add Slide (Ctrl+M)</span></button>
                  <button id="slide-duplicate-menu-item" class="builder-dropdown-item" type="button">📄 <span data-translate>Duplicate Slide (Ctrl+D)</span></button>
                  <button id="slide-combine-menu-item" class="builder-dropdown-item" type="button">🖇️ <span data-translate>Combine Columns</span></button>
                  <button id="slide-delete-menu-item" class="builder-dropdown-item" type="button">❌ <span data-translate>Delete Slide</span></button>
                  <button id="slide-move-up-menu-item" class="builder-dropdown-item" type="button">⬆ <span data-translate>Move Up</span></button>
                  <button id="slide-move-down-menu-item" class="builder-dropdown-item" type="button">⬇ <span data-translate>Move Down</span></button>
                  <button class="builder-dropdown-item is-disabled" type="button" disabled>✂️ <span data-translate>Break Slide (Ctrl+Enter)</span></button>
                  <button class="builder-dropdown-item is-disabled" type="button" disabled>✂️ <span data-translate>Break Line (Shift+Enter)</span></button>
                </div>
              </div>
              <button class="panel-toggle" type="button" aria-expanded="true" aria-label="Collapse slides in column" style="display: none;"></button>
            </div>
          </div>
          <div class="panel-body">
            <div id="slide-list" class="slide-list"></div>
          </div>
        </div>
        </div>
      </div>
      <div class="builder-panel column-markdown-panel" id="column-markdown-panel" hidden>
        <div class="panel-header panel-header-row">
          <span data-translate>Column Markdown</span>
        </div>
        <div class="panel-body">
          <textarea id="column-markdown-editor" spellcheck="true"></textarea>
        </div>
      </div>
    </section>

    <!-- ── Col resize handle (shown when code panel visible) ─────── -->
    <div class="col-resize-handle" id="mid-right-resize-handle" title="Drag to resize" hidden></div>

    <!-- ── Middle panel: code editors (hidden by default) ────────── -->
    <section class="builder-middle" hidden>
      <div id="code-editors-panel">
        <div class="builder-panel builder-topmatter panel-collapsible" data-panel="top-matter">
          <details>
            <summary class="panel-header panel-header-row">
              <span data-translate>Top Matter</span>
              <span class="topmatter-indicator" id="topmatter-indicator" aria-hidden="true">📌</span>
              <div class="panel-actions">
                <div class="builder-dropdown">
                  <button id="add-top-tint-btn" class="panel-button" type="button">🎨</button>
                  <div id="add-top-tint-menu" class="builder-dropdown-menu builder-dropdown-tint" hidden></div>
                </div>
                <div class="builder-dropdown">
                  <button id="add-top-format-btn" class="panel-button" type="button">✨</button>
                  <div id="add-top-format-menu" class="builder-dropdown-menu" hidden></div>
                </div>
                <div class="builder-dropdown">
                  <button id="add-top-media-btn" class="panel-button" type="button">🎞️</button>
                  <div id="add-top-media-menu" class="builder-dropdown-menu" hidden></div>
                </div>
                <button id="add-top-image-btn" class="panel-button" type="button">🖼️</button>
                <span class="panel-chevron" aria-hidden="true"></span>
              </div>
            </summary>
            <div class="panel-body">
              <textarea id="top-editor" spellcheck="false"></textarea>
            </div>
          </details>
        </div>
        <div class="builder-panel builder-editor panel-collapsible" data-panel="slide-markdown">
          <div class="panel-header panel-header-row">
            <span data-translate>Slide Markdown</span>
            <div class="panel-actions">
              <div class="builder-dropdown">
                <button id="slide-tools-btn" class="panel-button" type="button">🔧</button>
                <div id="slide-tools-menu" class="builder-dropdown-menu" hidden></div>
              </div>
              <div class="builder-dropdown">
                <button id="add-slide-format-btn" class="panel-button" type="button">✨</button>
                <div id="add-slide-format-menu" class="builder-dropdown-menu" hidden></div>
              </div>
              <div class="builder-dropdown">
                <button id="add-slide-media-btn" class="panel-button" type="button">🎞️</button>
                <div id="add-slide-media-menu" class="builder-dropdown-menu" hidden></div>
              </div>
              <div class="builder-dropdown">
                <button id="add-slide-audio-btn" class="panel-button" type="button">🎵</button>
                <div id="add-slide-audio-menu" class="builder-dropdown-menu" hidden></div>
              </div>
              <button id="add-slide-image-btn" class="panel-button" type="button">🖼️</button>
              <button class="panel-toggle" type="button" aria-expanded="true" aria-label="Collapse slide markdown"></button>
            </div>
          </div>
          <div class="panel-body">
            <textarea id="slide-editor" spellcheck="true"></textarea>
            <div id="table-picker" class="builder-table-picker" hidden>
              <div class="builder-table-picker-title" data-translate>Insert Table</div>
              <div id="table-picker-grid" class="builder-table-grid" role="grid" aria-label="Table size picker"></div>
              <div id="table-picker-size" class="builder-table-picker-size">0 x 0</div>
              <div class="builder-table-picker-actions">
                <button id="table-picker-cancel" class="panel-button" type="button" data-translate>Cancel</button>
              </div>
            </div>
          </div>
        </div>
      </div><!-- /code-editors-panel -->
    </section>

    <!-- ── Main editing area: canvas + notes ─────────────────────── -->
    <section class="builder-right">
      <div id="canvas-editor-panel" class="canvas-editor-panel"></div>
      <div class="row-resize-handle" id="canvas-notes-resize-handle"></div>
      <div class="builder-panel builder-notes panel-collapsible" data-panel="notes">
        <div class="panel-header panel-header-row">
          <span data-translate>Presenter Notes</span>
          <div class="panel-actions">
            <button class="panel-toggle" type="button" aria-expanded="true" aria-label="Collapse notes"></button>
          </div>
        </div>
        <div class="panel-body">
          <textarea id="notes-editor" spellcheck="true"></textarea>
        </div>
      </div>
      <!-- Hidden preview infrastructure — kept for JS compatibility -->
      <div class="builder-panel builder-preview" hidden>
        <div class="panel-header panel-header-row">
          <span data-translate>Live Preview</span>
          <div class="panel-actions">
            <button id="preview-push-btn" class="panel-button" title="Push to Peers" data-translate>📡</button>
            <button id="preview-link-btn" class="panel-button" title="Linked to Peers — click to unlink" style="display:none">🔗</button>
            <button id="preview-slide-btn" class="panel-button" data-translate>Preview Slide</button>
            <button id="preview-overview-btn" class="panel-button" data-translate>Overview</button>
          </div>
        </div>
        <div class="preview-frame-wrap">
          <iframe
            id="preview-frame"
            title="Presentation preview"
            sandbox="allow-scripts allow-same-origin"
            referrerpolicy="no-referrer"
          ></iframe>
        </div>
      </div>
    </section>

    <!-- ── Inspector panel ───────────────────────────────────────── -->
    <div class="col-resize-handle" id="right-insp-resize-handle" title="Drag to resize"></div>
    <section class="builder-inspector" id="builder-inspector">

      <div class="insp-section">
        <div class="insp-label">Background</div>
        <div class="insp-btn-row">
          <button class="insp-btn" id="insp-bg-btn">Image / Video</button>
          <button class="insp-btn" id="insp-tint-btn">Gradient</button>
        </div>
        <button class="insp-btn insp-remove-btn" id="insp-remove-bg-btn" hidden>✕ Remove</button>
      </div>
      <div class="insp-section">
        <div class="insp-label">Layout Zone</div>
        <div class="insp-zone-grid" id="insp-zone-grid">
          <button class="insp-zone-btn" data-zone="topleft" title="Top Left">↖</button>
          <button class="insp-zone-btn" data-zone="upperthird" title="Upper Third">↑</button>
          <button class="insp-zone-btn" data-zone="topright" title="Top Right">↗</button>
          <button class="insp-zone-btn" data-zone="shiftleft" title="Left">←</button>
          <button class="insp-zone-btn" data-zone="center" title="Center">⊙</button>
          <button class="insp-zone-btn" data-zone="shiftright" title="Right">→</button>
          <button class="insp-zone-btn" data-zone="bottomleft" title="Bottom Left">↙</button>
          <button class="insp-zone-btn" data-zone="lowerthird" title="Lower Third">↓</button>
          <button class="insp-zone-btn" data-zone="bottomright" title="Bottom Right">↘</button>
        </div>
      </div>
      <div class="insp-section">
        <div class="insp-label">Text</div>
        <select id="insp-block-type-select" class="insp-select insp-block-type-select">
          <option value="h1">Heading 1</option>
          <option value="h2">Heading 2</option>
          <option value="h3">Heading 3</option>
          <option value="h4">Heading 4</option>
          <option value="h5">Heading 5</option>
          <option value="p">Body</option>
          <option value="ul">Bullet List</option>
        </select>
        <select id="insp-text-bg-select" class="insp-select insp-text-bg-select">
          <option value="">No Text Background</option>
          <option value="darkbg">Dark Text Background</option>
          <option value="lightbg">Light Text Background</option>
        </select>
        <select id="insp-font-select" class="insp-select insp-font-select">
          <option value="">Default Font</option>
        </select>
        <div class="insp-row">
          <select id="insp-size-select" class="insp-select insp-size-select">
            <option value="">Size</option>
            <option value="5px">5</option>
            <option value="6px">6</option>
            <option value="7px">7</option>
            <option value="8px">8</option>
            <option value="9px">9</option>
            <option value="10px">10</option>
            <option value="11px">11</option>
            <option value="12px">12</option>
            <option value="13px">13</option>
            <option value="14px">14</option>
            <option value="16px">16</option>
            <option value="18px">18</option>
            <option value="20px">20</option>
            <option value="22px">22</option>
            <option value="24px">24</option>
            <option value="28px">28</option>
            <option value="32px">32</option>
            <option value="36px">36</option>
            <option value="40px">40</option>
            <option value="48px">48</option>
            <option value="56px">56</option>
            <option value="64px">64</option>
            <option value="72px">72</option>
          </select>
          <div class="builder-dropdown">
            <button type="button" id="insp-color-btn" class="insp-color" title="Text Color"><span class="insp-color-swatch"></span></button>
            <div id="insp-color-menu" class="builder-dropdown-menu xcp-dropdown" hidden></div>
          </div>
        </div>
        <div class="insp-row">
          <button class="insp-fmt-btn" id="insp-bold-btn" title="Bold"><b>B</b></button>
          <button class="insp-fmt-btn" id="insp-italic-btn" title="Italic"><i>I</i></button>
          <button class="insp-fmt-btn" id="insp-underline-btn" title="Underline"><u>U</u></button>
          <div class="insp-sep"></div>
          <button class="insp-align-btn" id="insp-align-left" data-align="left" title="Align Left"><svg width="13" height="11" viewBox="0 0 13 11" fill="currentColor"><rect x="0" y="0" width="13" height="2" rx="1"/><rect x="0" y="4.5" width="8" height="2" rx="1"/><rect x="0" y="9" width="13" height="2" rx="1"/></svg></button>
          <button class="insp-align-btn" id="insp-align-center" data-align="center" title="Align Center"><svg width="13" height="11" viewBox="0 0 13 11" fill="currentColor"><rect x="0" y="0" width="13" height="2" rx="1"/><rect x="2.5" y="4.5" width="8" height="2" rx="1"/><rect x="0" y="9" width="13" height="2" rx="1"/></svg></button>
          <button class="insp-align-btn" id="insp-align-right" data-align="right" title="Align Right"><svg width="13" height="11" viewBox="0 0 13 11" fill="currentColor"><rect x="0" y="0" width="13" height="2" rx="1"/><rect x="5" y="4.5" width="8" height="2" rx="1"/><rect x="0" y="9" width="13" height="2" rx="1"/></svg></button>
          <button class="insp-align-btn" id="insp-align-justify" data-align="justify" title="Justify"><svg width="13" height="11" viewBox="0 0 13 11" fill="currentColor"><rect x="0" y="0" width="13" height="2" rx="1"/><rect x="0" y="4.5" width="13" height="2" rx="1"/><rect x="0" y="9" width="13" height="2" rx="1"/></svg></button>
        </div>
      </div>
      <div class="insp-footer">
        <button id="show-code-btn" class="show-code-btn">Show Code ▾</button>
      </div>
    </section>
  </main>

  <footer class="builder-status">
    <div id="status-text" data-translate>Loading presentation…</div>
    <div id="save-indicator"></div>
  </footer>

  <script src="/admin/vendor/js-yaml.js"></script>
  <script src="/js/translate.js"></script>
  <script type="module" src="/admin/builder.js"></script>
</body>
</html>
